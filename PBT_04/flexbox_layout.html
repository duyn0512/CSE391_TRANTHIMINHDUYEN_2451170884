<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexbox Layout Demo</title>
    <link rel="stylesheet" href="flexbox.css">
</head>
<body>
    
    <header class="navbar">

        <div class="logo">Royal Flower</div>
        <nav class="nav-menu">
            <a href="#">Home</a>
            <a href="#">Products</a>
            <a href="#">About</a>
        </nav>

        <div class="auth-buttons">
            <a href="#">Login</a>
            <a href="#">Register</a>
        </div>
        
    </header>

    <main class="container">
        <div class="product-grid">
            <div class="product-card">
                <div class="product-img">
                    <img src="images/camtucau.jpg" alt="Sản phẩm 1">
                </div>
                <div class="product-info">
                    <h3>Cẩm tú cầu</h3>
                    <p>400.000đ</p>
                </div>
                <button>Mua</button>
            </div>

            <div class="product-card">
                <div class="product-img">
                    <img src="images/tulip.jpg" alt="Sản phẩm 2">
                </div>
                <div class="product-info">
                    <h3>Tulip</h3>
                    <p>1.200.000đ</p>
                </div>
                <button>Mua</button>
            </div>

            <div class="product-card">
                <div class="product-img">
                    <img src="images/huongduong.jpg" alt="Sản phẩm 3">
                </div>
                <div class="product-info">
                    <h3>Hướng dương</h3>
                    <p>300.000đ</p>
                </div>
                <button>Mua</button>
            </div>

            <div class="product-card">
                <div class="product-img">
                    <img src="images/linhlan.jpg" alt="Sản phẩm 4">
                </div>
                <div class="product-info">
                    <h3>Linh lan</h3>
                    <p>2.400.000đ</p>
                </div>
                <button>Mua</button>
            </div>

            <div class="product-card">
                <div class="product-img">
                    <img src="images/sofia.jpg" alt="Sản phẩm 5">
                </div>
                <div class="product-info">
                    <h3>Sofia</h3>
                    <p>700.000đ</p>
                </div>
                <button>Mua</button>
            </div>

            <div class="product-card">
                <div class="product-img">
                    <img src="images/hoahong.jpg" alt="Sản phẩm 6">
                </div>
                <div class="product-info">
                    <h3>Hoa hồng</h3>
                    <p>600.000đ</p>
                </div>
                <button>Mua</button>
            </div>

            <div class="product-card">
                <div class="product-img">
                    <img src="images/hoacuc.jpg" alt="Sản phẩm 7">
                </div>
                <div class="product-info">
                    <h3>Hoa cúc Bellis Perennis</h3>
                    <p>250.000đ</p>
                </div>
                <button>Mua</button>
            </div>

            <div class="product-card">
                <div class="product-img">
                    <img src="images/hoacamtruong.jpg" alt="Sản phẩm 8">
                </div>
                <div class="product-info">
                    <h3>Hoa cẩm trướng</h3>
                    <p>350.000đ</p>
                </div>
                <button>Mua</button>
            </div>
        </div>
    </main>

</body>
</html>
