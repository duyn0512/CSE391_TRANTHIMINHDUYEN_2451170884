<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Validation Test</title>
</head>
<body>

    <h1>HTML5 Validation Test</h1>

    <form>

       <p>
        <label>1. Test Required:</label><br>
        <input type="text" required value="">
       </p>

       <p>
            <label>2. Test Email (nhập "abc"):</label><br>
            <input type="email" value="abc">
        </p>

        <p>
            <label>3. Test Max Number (nhập 15):</label><br>
            <input type="number" min="1" max="10" value="15">
        </p>

        <p>
            <label>4. Test Pattern (nhập "abc123"):</label><br>
            <input type="text" pattern="[0-9]{10}" value="abc123">
        </p>

        <p>
            <label>5. Test Minlength (nhập "123"):</label><br>
            <input type="password" minlength="8" value="123">
        </p>

        <button type="submit"> Submit</button>
    </form>
</body>
</html>
