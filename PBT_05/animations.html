<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flower Shop Animations</title>

    <link rel="stylesheet" href="animations.css">
</head>
<body>

    <header class="navbar">

        <div class="logo">Royal Flower</div>

        <button class="hamburger">☰</button>

        <nav class="nav-menu">
            <a href="#">Home</a>
            <a href="#">Products</a>
            <a href="#">About</a>
            <a href="#">Contact</a>
        </nav>

        <div class="auth-buttons">
            <a href="#">Login</a>
            <a href="#">Register</a>
        </div>

    </header>
    
    <div class="product-list">

        <div class="product-card">
            <div class="product-img">
                <img src="images/camtucau.jpg" alt="Cẩm tú cầu">
            </div>

            <div class="product-info">
                <h3>Cẩm tú cầu</h3>
                <p>400.000đ</p>
            </div>

            <button>Mua</button>
        </div>

        <div class="product-card">
            <div class="product-img">
                <img src="images/tulip.jpg" alt="Tulip">
            </div>

            <div class="product-info">
                <h3>Hoa Tulip</h3>
                <p>1.200.000đ</p>
            </div>

            <button>Mua</button>
        </div>

        <div class="product-card">
            <div class="product-img">
                <img src="images/huongduong.jpg" alt="Hướng dương">
            </div>

            <div class="product-info">
                <h3>Hướng dương</h3>
                <p>300.000đ</p>
            </div>

            <button>Mua</button>
        </div>

        <div class="product-card">
            <div class="product-img">
                <img src="images/linhlan.jpg" alt="Linh lan">
            </div>

            <div class="product-info">
                <h3>Linh lan</h3>
                <p>2.400.000đ</p>
            </div>

            <button>Mua</button>
        </div>

        <div class="product-card">
            <div class="product-img">
                <img src="images/sofia.jpg" alt="Sofia">
            </div>

            <div class="product-info">
                <h3>Sofia</h3>
                <p>700.000đ</p>
            </div>

            <button>Mua</button>
        </div>

        <div class="product-card">
            <div class="product-img">
                <img src="images/hoahong.jpg" alt="Hoa hồng">
            </div>

            <div class="product-info">
                <h3>Hoa hồng</h3>
                <p>600.000đ</p>
            </div>

            <button>Mua</button>
        </div>

        <div class="product-card">
            <div class="product-img">
                <img src="images/hoacuc.jpg" alt="Hoa cúc">
            </div>

            <div class="product-info">
                <h3>Bellis Perennis</h3>
                <p>250.000đ</p>
            </div>

            <button>Mua</button>
        </div>

        <div class="product-card">
            <div class="product-img">
                <img src="images/hoacamtruong.jpg" alt="Hoa cẩm trướng">
            </div>

            <div class="product-info">
                <h3>Hoa cẩm trướng</h3>
                <p>350.000đ</p>
            </div>

            <button>Mua</button>
        </div>

    </div>

    <div class="spinner"></div>

</body>
</html>
